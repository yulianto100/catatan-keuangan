<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Keuangan</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#22c55e">

  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="app">

  <h2 class="title">💰 Keuangan</h2>

  <!-- 🔥 SALDO CARD BARU -->
  <div class="saldo-card">
    <div class="saldo-top">Saldo</div>
    <div class="saldo-main" id="saldo">Rp 0</div>

    <div class="saldo-detail">
      <div class="income">⬆️ <span id="totalMasuk">Rp 0</span></div>
      <div class="expense">⬇️ <span id="totalKeluar">Rp 0</span></div>
    </div>
  </div>

  <!-- LAPORAN -->
  <div class="report">
    <div class="report-head">
      <h3>📊 Laporan</h3>
      <button onclick="toggleFilter()" class="filter-btn">⚙️</button>
    </div>

    <div id="filterPanel" class="filter-panel">
      <label>Dari Bulan</label>
      <input type="month" id="fromMonth">

      <label>Sampai Bulan</label>
      <input type="month" id="toMonth">

      <label>Kategori</label>

      <div class="filter-actions">
        <button onclick="selectAllKategori()">All</button>
        <button onclick="clearAllKategori()">Clear</button>
      </div>

      <div id="filterKategori" class="filter-kategori"></div>

      <button onclick="applyFilter()">Terapkan</button>
      <button class="btn-close" onclick="resetFilter()">Reset</button>
    </div>

<div class="report-header" onclick="toggleMasuk()">
  <div class="left">
    <span class="text-masuk">⬆️ Pemasukan</span>
  </div>
  <div class="right">
    <b id="totalMasukReport">Rp 0</b> ▼
  </div>
</div>

    <div id="laporanMasuk" class="report-content" style="display:none"></div>

<div class="report-header" onclick="toggleKeluar()">
  <div class="left">
    <span class="text-keluar">⬇️ Pengeluaran</span>
  </div>
  <div class="right">
    <b id="totalKeluarReport">Rp 0</b> ▼
  </div>
</div>

   <div id="laporanKeluar" class="report-content" style="display:none"></div>
  </div>

  <div id="list" class="list"></div>

  <!-- FAB -->
  <button class="fab" onclick="openSheet()">＋</button>

  <!-- SHEET -->
<div class="sheet" id="sheet">
  <div class="sheet-box">

    <div class="drag-bar" id="dragBar"></div>

    <div class="sheet-header">
      <h3>Tambah Transaksi</h3>
    </div>

    <div class="sheet-content">

      <input type="date" id="tanggal">
      <input type="text" id="nama" placeholder="Keterangan">
      <input type="number" id="nominal" placeholder="Nominal">

      <select id="kategori">
        <option>Bills</option>
        <option>Clothes</option>
        <option>Communication</option>
        <option>Eating Out</option>
        <option>Entertainment</option>
        <option>Food</option>
        <option>Gifts</option>
        <option>Health</option>
        <option>House</option>
        <option>Nafkah</option>
        <option>Jajan Mas</option>
        <option>Motorcycle</option>
        <option>Sports</option>
        <option>Toiletry</option>
        <option>Transport</option>
        <option>Deposits</option>
        <option>Salary</option>
        <option>Saving</option>
      </select>

      <select id="tipe">
        <option value="masuk">Pemasukan</option>
        <option value="keluar">Pengeluaran</option>
      </select>

      <select id="wallet">
        <option>Cash</option>
        <option>Bank</option>
        <option>E-Wallet</option>
      </select>

      <button onclick="tambahData()">Simpan</button>
      <button class="btn-close" onclick="closeSheet()">Tutup</button>

    </div>

  </div>
</div>

  <!-- POPUP -->
  <div class="popup" id="popup">
    <div class="popup-box">
      <p>Hapus transaksi ini?</p>
      <button onclick="confirmDelete()">Hapus</button>
      <button class="btn-close" onclick="closePopup()">Batal</button>
    </div>
  </div>

</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

}
</script>

</body>
</html>
