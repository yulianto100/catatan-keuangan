<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Keuangan</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#22c55e">
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="app">

  <h2>💰 Keuangan</h2>

  <!-- 🔥 MULTI DATABASE -->
  <div style="margin-bottom:12px">
    <select id="groupSelect"></select>
    <button onclick="createGroup()">+ Database</button>
  </div>

  <div class="saldo-card">
    <p>Saldo</p>
    <h1 id="saldo">Rp 0</h1>

    <div class="row">
      <span>⬆️ <b id="totalMasuk">Rp 0</b></span>
      <span>⬇️ <b id="totalKeluar">Rp 0</b></span>
    </div>
  </div>

  <div class="report">
    <h3>📊 Laporan</h3>
    <div id="laporanMasuk"></div>
    <div id="laporanKeluar"></div>
  </div>

  <div id="list" class="list"></div>

  <button class="fab" onclick="openSheet()">＋</button>

  <div class="sheet" id="sheet">
    <div class="sheet-content">
      <input type="date" id="tanggal">
      <input type="text" id="nama" placeholder="Keterangan">
      <input type="number" id="nominal" placeholder="Nominal">

      <!-- 🔥 KATEGORI FULL -->
      <select id="kategori">
        <option>Bills</option>
        <option>Clothes</option>
        <option>Communication</option>
        <option>Eating Out</option>
        <option>Entertainment</option>
        <option>Food</option>
        <option>Gifts</option>
        <option>Health</option>
        <option>House</option>
        <option>Jajan Mas</option>
        <option>Motorcycle</option>
        <option>Sports</option>
        <option>Toiletry</option>
        <option>Transport</option>
        <option>Deposits</option>
        <option>Salary</option>
        <option>Saving</option>
      </select>

      <select id="tipe">
        <option value="masuk">Pemasukan</option>
        <option value="keluar">Pengeluaran</option>
      </select>

      <button onclick="tambahData()">Simpan</button>
    </div>
  </div>

</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

</body>
</html>
